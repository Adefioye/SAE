base_model:
  repo_id: EleutherAI/pythia-160m
  revision: null
  hook_point: blocks.6.hook_mlp_out
  device: auto
  dtype: float32
  model_from_pretrained_kwargs:
    center_writing_weights: false

saes:
  - name: seed_0
    format: sae_lens
    repo_id: kokolamba/pythia-160m-seeds
    revision: main
    checkpoint: pythia-160m-500m-two-seed/trained_saes/seed_0
  - name: seed_1
    format: sae_lens
    repo_id: kokolamba/pythia-160m-seeds
    revision: main
    checkpoint: pythia-160m-500m-two-seed/trained_saes/seed_1

dataset:
  repo_id: apollo-research/monology-pile-uncopyrighted-tokenizer-EleutherAI-gpt-neox-20b
  revision: null
  split: train
  text_column: text
  token_column: input_ids
  sequence_length: 128
  max_sequences: 5000
  random_seed: 42
  streaming: true

activations:
  batch_size: 16
  encoder_batch_tokens: 512
  active_threshold: 0.0
  threshold_mode: fixed
  threshold_quantile: 0.99
  save_format: sparse_npz
  store_dense: false

matching:
  method: decoder_cosine
  decoder_weight: 1.0
  encoder_weight: 0.0
  activation_correlation_weight: 0.0
  minimum_similarity: 0.0
  # The paper used full, separate encoder and decoder Hungarian assignments.
  # A 32,768 x 32,768 float32 score matrix is 4 GiB before solver overhead.
  solver: exact
  exact_max_features: 8192
  candidate_top_k: 256
  similarity_batch_size: 1024

paper_matching:
  enabled: true
  shared_threshold: 0.7
  threshold_sweep_points: 101

cka:
  max_samples: 50000
  center: true
  standardize_features: false

svcca:
  explained_variance: 0.99
  max_components: 1024
  max_samples: 50000
  ridge: 1.0e-6

controls:
  enabled: true
  random_pairs_per_match: 1
  frequency_bins: 20

bootstrap:
  samples: 1000
  confidence_level: 0.95

output_dir: ../results/sae_seed_similarity
force: false
